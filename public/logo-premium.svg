<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B3A5A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5B041;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D49B2A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="100" cy="100" r="90" fill="url(#gradBlue)" filter="url(#shadow)"/>
  
  <g transform="translate(100, 100)">
    <line x1="-12" y1="5" x2="12" y2="5" stroke="#0A2540" stroke-width="4" stroke-linecap="round"/>
    <line x1="-12" y1="15" x2="12" y2="15" stroke="#0A2540" stroke-width="4" stroke-linecap="round"/>
    <line x1="-12" y1="25" x2="12" y2="25" stroke="#0A2540" stroke-width="4" stroke-linecap="round"/>
    <line x1="-12" y1="35" x2="12" y2="35" stroke="#0A2540" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <text x="100" y="175" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#F5B041">PREMIUM</text>
</svg>
